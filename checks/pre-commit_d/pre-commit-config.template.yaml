---
repos:
  - repo: local
    hooks:
      - id: forbid-code-checking-ref
        name: forbid tracked code-checking-ref
        entry: __HOOK_PREFIX__/checks/guard-code-checking-ref.sh --target-root .
        language: script
        pass_filenames: false
        always_run: true
        stages: [commit]
        require_serial: true
      - id: shellcheck
        name: shellcheck
        entry: __HOOK_PREFIX__/bin/run-linters.sh --mode changed --target-root .
        language: script
        pass_filenames: false
        types: [shell]
        stages: [commit]
        require_serial: false
