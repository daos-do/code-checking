---
name: setup-dev smoke test

'on':
  pull_request:

jobs:
  smoke:
    name: setup-dev (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run setup-dev
        run: ./bin/setup-dev.sh
