---
name: setup-dev smoke test

'on':
  pull_request:

jobs:
  smoke:
    name: setup-dev (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run setup-dev
        run: ./bin/setup-dev.sh
