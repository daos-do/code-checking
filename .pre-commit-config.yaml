repos:
  - repo: local
    hooks:
      - id: forbid-code-checking-ref
        name: forbid tracked .code-checking-ref
        entry: checks/guard-code-checking-ref.sh --target-root .
        language: script
        pass_filenames: false
        always_run: true
        stages: [commit]
        require_serial: true
      - id: verify-executable-modes
        name: verify executable modes
        entry: checks/verify-executable-modes.sh --target-root .
        language: script
        pass_filenames: false
        always_run: true
        stages: [commit]
        require_serial: true
      - id: shellcheck
        name: shellcheck
        entry: bin/run-linters.sh --mode changed --target-root .
        language: script
        pass_filenames: false
        types: [shell]
        stages: [commit]
        require_serial: false
