- id: forbid-code-checking-ref
  name: forbid tracked code-checking-ref
  description: Blocks commits that track the temporary override file
  entry: checks/guard-code-checking-ref.sh --target-root .
  language: script
  pass_filenames: false
  always_run: true
  stages: [commit]
  require_serial: true

- id: basic-source-linters
  name: basic source linters
  description: Runs selected changed-file linters (supports --fix for applicable checks)
  entry: bin/run-linters.sh --mode changed
  language: script
  pass_filenames: false
  always_run: true
  stages: [commit]
  require_serial: false

# NOTE: To enable auto-fix for selected checks in your .pre-commit-config.yaml, add:
#   args: [--fix]
# See https://github.com/daos-do/code-checking/blob/main/docs/linters.md#auto-fix-mode
